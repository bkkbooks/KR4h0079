body:
  text: 忠義集總集類提要臣等謹案忠義集七巻元趙景良編初劉壎作補史十忠詩一巻述宋末李芾趙卯發文天祥陸秀夫江萬里宻祐李庭芝陳文龍張世傑張珏之事壎自為序其子麟瑞復取宋末節義之士撰述遺事賦五十律題曰昭忠逸詠凡四巻亦自為前後序又有岳天祐者序之景良合二集為一編又采宋末遺老諸作續為二巻而併麟瑞詩四巻為三總名之曰忠義集於時宋史未修葢藉詩以存史也其書在元不甚著明𢎞治中江右何喬新始序而梓之序言附録中有汪元量詩然實無之未詳其故又方回背宋降元為世僇笑其人最不足道而景良列之忠義中亦所未詳也壎字起潛南豐人生宋淳祐間入元為延平敎授所撰有水雲村稿隠居通議巳別著録麟瑞號如村至治中人景良字秉善為二劉之鄉人云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀忠義集序宋有天下三百餘年以仁厚立國以詩書造士以節義勵士大夫故其士民觀感興起皆知殺身成仁之為美及其遭罹變故而且亡也死宗廟者有之死社稷者有之死君上者有之死城郭封疆者又有之下至山谷之儒里巷之婦亦皆秉義抱節矢死不辱嗚呼漢唐之末曷嘗有是哉南豐水村劉先生壎如村劉先生麟瑞生當宋元之際懼忠臣烈士貞婦湮沒而無傳也水村作十忠補史詩如村作昭忠逸詠皆據其所見聞而錄之蓋野史之流也其邑人趙秉善合二先生所作為一編附以汪水雲方虚谷諸君子傷時悼事之什若千首總謂之忠義集當是時元有天下諱言宋事諸儒於是集私相傳錄而已歴世既久遺老凋謝殆盡後生不知前輩麥秀黍離之悲而是集㡬與塵埃蟲鼠共弊於敗篋之間上舍生趙君璽二先生之鄉人也得是集於老農之家讀而悲之迺校補其訛缺持以示予予受而閲之觀文履善對博囉之語謝君直復留夢炎之書為之慨然觀吳楚材答錄事之詰朱浚語兵士之詞毛髮洒然恨不生同其時助其怒罵也觀劉鋭幼兒下拜受藥與王士敏詩書于裾以死自誓又泫然淚落而不能自已也嗚呼三百餘年樂育之效可見於此矣因釐為七巻錄而藏之浙江僉憲王君廷光見之歎曰此集所紀多宋史所遺者是不可使其無傳將刻諸梓屬予序之嗟夫忠義人之大節也根於天性具於人心凡立于天地之間而名為人者孰無是性孰無是心哉惟存養不失則其氣浩然一旦遭事之變觸白刃蹈鼎鑊而不懾若此集所載諸君子是也先正有言讀出師表而不流淚者其人必不忠讀陳情表而不流淚者其人必不孝予謂讀是集而不洛嗟涕洟者尚可謂之人哉廷光佐外臺風力澟然惓惓欲刻是集而傳之其所契者深矣
