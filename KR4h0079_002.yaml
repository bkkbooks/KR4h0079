body:
  text: 忠義集巻二元趙景良編昭忠逸詠序士見危致命此立身之大節君子道窮之時但當委致其命以遂吾之志而已功業係乎時忠義存於我於漢唐得諸葛公狄梁公郭令公天下服之社稷生民賴之可為委質事君之法若時與道違當效杲卿真卿張巡許逺輩庶幾君臣之義盡矣宋史未脩其季世仗節死義之臣將遂湮没而勵賢善俗士君子之所當為也南豐逸士劉如村作昭忠逸詠茲以見示觀其事蹟具備賛詠警策誠有益於風敎者焉嘗聞劉後村有詠史三百首游清獻公愛之㩦入都堂今如村之逸詠實可備太史氏之採擇非特游公之賞識而已噫五倫之道五常之教周浹維持於上下數千載之間者如一日非人力之為皆天理之同然也覽是篇者亦克用勸文學掾相臺岳天祐書此以識所曾觀至順壬申中元如村自序禮曰謀人之軍師敗則死之謀人之邦邑危則亡之其有偷生徇利者豈禮也哉子曰志士仁人無求生以害仁有殺身以成仁其是之謂乎嘗讀卞侍中顔平原暨張許二公死節事未嘗不潜心繙閱若身處其間雖歴千載猶使人興起也非志士仁人乎宋末革命豈無繼踵者顧湮鬱弗彰殊可歎也欽惟太祖皇帝啓運朔方肇興大業世祖皇帝神聖英武受天明命混一區夏兵威所鄉㒺不解甲投戈以近王師亦復有不忍遽忘君父背城借一戰者豈違乎天命哉為臣死忠古有明訓則亦惟曰臣子職分爾茍食禄避難含恥易節朝為仇敵暮為君臣於義何在春秋衮斧何所逃乎善乎翰林侍講學士元公明善志集賢直學士文公陞之墓曰宋死節臣少保右丞相兼樞密使信國公姓文氏嗣子某官某書法昭昭則世之公論韙矣追維仗節死義之士事日益逺嵗日益深遺老日益凋謝舊聞日益銷泯其不與草木同腐者㡬希暇日搜討遺事賦五十律題曰昭忠逸詠惜乎材踈筆弱無能發揚姑志其槩以彰節義俾死封疆死社稷者含笑九地曰吾名不泯矣寜不少慰忠魂於千載乎寜不為明時風化之一助乎於是乎書至治元年辛酉日南至豐民劉麟瑞稽首再拜謹述昭忠逸詠忠義總管田公燧鳯守李公寔鳯州在利州西路漢為武都郡固道河池縣地南齊政州西魏鳯州隋立河池郡唐鳯州又改河池郡復為鳯州天西戰士競㗸枚乗㑹關夷路始開兩蜀金湯隨水逝三秦烽火照天来鳯州文武渾無愧馬嶺英靈只自哀後夜魂歸何處寓隴頭瀟洒一枝梅辛卯三月十三日大兵自興元府邊面乘㑹關入宋界十八日闖鳯州至馬嶺堡忠義總管田燧以兵三千駐堡鏖戰數日援絶死之四月二十七日陷鳯州知州李寔通判張度敎授張叔寅死之西和知州陳公寅守將楊公銳西和州在利州西路秦隴西郡臨洮縣西魏岷州隋唐改臨洮郡政和郡復岷州宋以金人請和改西和州隂風蕭颯起黄埃鐵騎追奔動地来石堡梯空天險壮水門釁隙殺機開不期溟海鵬千里自守封疆鴆一杯四十萬民登鬼録伊誰為使哭聲哀辛卯秋八月十四日大兵陷西和州初楊銳為摧鋒統制領千兵戍守與陳寅率兵民慿城死戰俘殺甚多西和削山為基四面陡絶獨水門一路有釁将官劉卓挾小忿踰城以水門降大兵乃併力攻陷寅與其家四十口自鴆死銳率諸将力戰死寅先籍城中三十七萬九千單八口告急制司求援至是盡殱焉沔州知州楊公起通判王公友仲沔州在利州西路漢沮縣地蜀立梁州梁立武興國魏立興州唐興州宋因吳曦之變改沔州談笑誰將敵將殘沔陽屯戍怯孤單兵威到處降非易地利乗機守亦難五馬交綏凝血碧貳車含憤剖心丹文臣武将均無忝不負吾君不素餐辛卯冬十月十七日大兵至青野原都統張宣以兵二千守之部将馮澤偽降誘殺大将蘇布赫遂㧞營去廿日攻沔州都統知州楊起戰死通判王友仲死之沔陷階州守臣董公鵬飛階州在利州西路漢武都郡西魏立武階郡改武州唐武州改階州相傳報怨撼階州虎旅飛来睨敵樓楛矢蔽空天入暝鵝車衝壘地成愁金城魚肉千年恨闔境衣冠六日休莫怪傳家猶强項雲孫忠節更風流十一月廿七日大兵逼文州聲言報花石峽之役都統曹友聞遣歩將全貴徃援戰殁詰朝自文合兵攻階被圍援絶知州董鵬飛拒戰十二月三日城破鵬飛全家死之大兵屠其城天水知軍時公當可西和總管陳公瑀天水軍在利州西路秦天水隴西縣漢立天水郡魏改秦州宋秦州為金所陷惟天水縣獨存乃立天水軍天水西和兩將强七書貯腹負剛腸魚麗陣布刀如雪馬革屍空骨似霜亷藺昔存秦莫敵關張今敗蜀終亡輕財得士人猶惜長想英風慨智囊丙申端平制司檄時當可知天水軍自大安提兵度闗之官三月十九日趨麥山積山擣北塞斬首數千級翌日大兵乗其䟦涉初至擁衆追躡當可力戰死兵盡殁夏四月大兵至同慶西和州總管陳瑀提兵巡屯遇大兵於赤菜谷力戰不敵亦死當可字文舉天水士人也與曹友聞相得從友聞軍屢立功智數膽畧友聞自謂不如尤輕財得賞賜均與戰士死之日妻子赤立瑀字伯玉西和貢士也累戰有功軍民惜之都統曹公友聞及大安夜戰死節諸將鴈塔名香本一儒執殳幾度為前驅元戎却敵世間有敎授提兵天下無花石峽鏖忠勇奮水牛嶺度死生殊英風壮節誰能匹千載人稱大丈夫勇戴兠鍪學六韜赤心報國是英豪遍身膽在存全蜀葢世名高慴短曹雞堡出竒師旅没龍門盡銳弟兄勞當時制帥猶多計獨向深山逺遁逃友聞同慶栗亭人也擢丙戌第為天水軍敎授以功名自任制司命招忠義就以為總管所部皆兩界亡命及武仙汪世顯麾下囘囘西夏十八族之不歸附者敵甚畏之目為短曹遍身膽友聞遂以遍身膽為旗號毎戰勝即分其家貲以賞丙申秋八月二太子及塔海元帥以精兵五十萬於初三日入大散闗友聞議堅守沔州㑹合四川忠義赴沔制司連檄友聞屯大安友聞不可督以軍令友聞歎曰武休出竒前旣失機沔陽堅守今又掣肘以此誤蜀蜀必亡吾與俱亡矣九月九日不得已離沔赴大安十六日至謀於諸將曰前日沔州主客勢殊故北兵月餘不敢動其奸謀欲誘我也制司已堕其術沔州既不守敵已得志大安平坦旦夕必併兵至若與之戰衆寡不敵止有雞冠山一堡可守然無粮無水諸君能堅守五日乎諸將曰若堅壁不戰何止五日但恐粮盡友聞曰今見兵二萬以一萬付汝等守此山而自帶一萬出竒彼止謂我在堡上必来攻汝等逆折其鋒佯敗入堡我決乘夜擣其背以兩聲鼓為號聞聲則出内外夾擊又令大聞陽平關以誘敵營内不立旗幟炊烟不出突雞犬不聲二十日大兵至十八里二十一日友聞入敎場選精兵健將皆二十以上四十以下忠義七千人兩戍司兵七百人夜一鼔後由大安渡江直經七篙堤逆上三百餘里復渡江面幹来劉溪黑水一帶谷道出敵背退伏二十二日大兵節次至先有哨馬至見關門開無人徑入伏兵斬之大隊繼至曹萬劉孝全麾兵戰關外自辰至未大兵敗績日暮萬等歛兵駐雞冠隘大兵環堡擣塹排木數層圍之二十七日友聞探知大兵已掠大安令諸軍束装戒諸將曰我曺家一軍累年忠赤報國聲撼秦隴今與汝等在敵之背正欲出敵不意用竒制勝且北兵今號百萬為必取蜀計諸君食君之禄用民之財正宜奮發忠勇立功上報國家下報蜀民大丈夫當於死中求富貴先鋒夏用可提兵奮入陽平關直趨北營王漢臣吕嗣宗可提兵分頭入左右隘奪隘口入關統制王畏可専駐陽平關外捉敗馬居常夜刼寨止二三百人今提萬人謂之夜戰各帶白搭膊以全勝二字為號再三告戒訖遂進行二十里少憇值暴雨如注索途冥行嗣宗謂友聞曰今大風雨不息人馬疲乏不若在此待明朝友聞曰雞冠隘無粮無水無城初約五日今已十八日此山一破技無所施雖大風雨機㑹豈可失也至水牛嶺分三道入北營轉戰至曉破數十營直入陽平關北兵備内不備外又以雨作盡歸氊帳殺死十數萬雞冠山之兵聞鼔聲出堡夾擊轉戰至囘囘寨二太子欲取韓溪路走㑹天大明分騎為百十隊更迭馳突鏖戰二十八日午未間友聞馬中數箭步騎五六百人諸将曰軍雖戰没然殺敵亦過半將軍曷若突圍而出以圗後舉將軍身在敵決不敢入蜀友聞乃率餘騎突陣而出敵俱披靡至酉戌時友聞中流矢下馬步闘死之夏用等諸將皆戰死曹萬僅存五百餘人入堡謂劉孝全曰兄旣亡兵亦盡堅守此堡猶可制敵然即目無粮與其坐待以亡孰若突陣而出可則可不然與敵俱死二十九日黎明率諸將轉戰至龍門萬孝全俱死之王宣守七里堡面中兩矢亦死曹兵苦戰制司各逺遁不遣一兵為援三泉之下白骨山積大兵不意友聞盤旋大安搜戰地三尺得遍身膽旗及其屍然後舉手加額平步入蜀矣制司嘗旌以旗曰元戎却敵世間有敎授提兵天下無毎戰掲之前驅友聞昔年與大兵戰於花石峽獲捷制參王公翊十萬天兵壓錦城繁華一瞬鎻連營小臣獨守紅蓮幕大義難忘白玉京虎倒龍顛塵瀁漭天隂雨濕燐縱横皠皠白骨成京觀愁絶靈龜召禍萌大兵既滅曹軍遂破閬州取潼川路直入成都十月十七日至懷安軍金堂縣策馬渡江成都太平日久不識兵革制使丁黼昬庸無謀哨馬至閬猶晏然十八日已時哨至漢州牟池鎮鐡騎三百申時至成都城北駟馬橋城中忽聞有軍至疑是潰兵大兵沿城至大東門徑登城十九日大兵徃來城中居民皆縱觀向晚五巷内南商數人擒殺一騎民間始知是大兵市人或執挺與馳或以几卓攔截街巷大兵復出屯城外二十日已午時再入城居民皆閉門有舉家縊死者有舉家自焚者制帥丁黼與甥王茶幹徐監倉遁微服至南門假道石笋觀音院哨及六人俱死二十一日官屬俱遁惟制司參議官王翊及僚屬二人召軍民立賞格與共擊北兵二十四日大兵步騎十萬至成都入自東門二太子坐府衙文明㕔令卜者占其法用五龜寘五盤中按五方五龜動不止卜者曰民心不歸成都是四絶死地若住不過二世不若血洗而去二太子大書火殺二字城中百姓無得免者火光照百里火逼制參王翊公裳秉笏堅坐兵士何龍扶至府衙東所避火大兵問是何人翊曰小官食君之禄臨難不能救死有餘責可急殺我又問何以不去曰願與此城同死大兵相語曰忠臣也令人守之戒勿逼二十六日府治火龍又扶翊至栁隄赴井死權知文州劉公銳通判趙公汝曏文州在利州西路漢廣漢郡晉隂平郡後周立文州唐文州改隂平郡復文州移治於故城高原上江流移浚向南山渇死全城膽亦寒叛將踰城機盡泄嬌兒飲藥淚空澘封疆事去君臣在忠孝名存父子難五萬軍民同日盡可憐巷戰尚間關出入韻大兵攻文州權州劉鋭通判趙汝曏激勵軍民八千堅守自九月十九日晝夜接戰五十餘城無水仰給江流大兵别浚江道移向南山城中水絶人馬渴死過半有興元都統陳昱以遇拘文城夜踰城出降告以虚實攻益急鋭自度不免夜集家人盡飲以藥聚屍及金帛誥命焚之鋭家素有禮少子同哥鋭所鍾愛飲藥時同哥猶在抱下拜而受之左右大慟鋭與長子及餘兵皆渇悶僵立不能行鋭自殺汝曏突圍被執臠殺之城破餘兵皆奮空拳巷戰死被圍七十五日軍民死者五萬餘綿漢簡州諸公綿漢簡並屬成都府路梓綿州廣漢涪縣先主分立潼郡西魏置潼州隋改綿州唐改金山郡巴西郡復綿州宋朝因之漢州漢蜀郡分為廣漢西漢新都國宋齊廣漢郡後周廢之唐立漢州又漢陽軍復漢州宋因之簡州漢武分蜀郡置犍為郡魏置資州隋置簡州唐置簡州又改陽安郡復為簡州宋因之綿漢風酸動殺機北来鐵騎遍驅馳幾千里地弓刀運百萬人家骨肉糜鬼哭神號無限恨蠅姑蚋嘬有餘悲平生食禄何從避留取香名百世垂大兵分哨入簡州知州李大全死知懷安軍史顯孫避于簡亦死大兵至漢州通判權州劉當可與一宗室太保率民兵城守太保出城徃羅山謁賀靖借兵歸遇大兵見殺遂破城忿而血洗焚蕩死者十萬餘家當可與節制邵復知縣羅由敎授袁死拱辰知縣羅父子皆遇害知綿州范辰孫金州守臣和公彦威統制楊公福興金州在利州東路秦漢中西城縣東漢西城郡西魏改金州立金城郡隋為西城郡唐復金州宋平蜀改昭化軍貔貅曾是守饒風扞拓金房未易攻十八谷開通徼外五千兵勁入關中賀蘭不救睢陽敗諸葛猶存越巂功當日更推楊統制馬傷軍没箭飛紅彦威守金丙申八月大兵入蜀時遣兵守饒風關不攻而過彦威與忠順軍統制張珎謀𢷬其虚十一月提兵五千從金州箐口十八谷徑詣長安襲其家計寨是年北兵至成都不久駐者以彦威牽制也及大兵自鳯州出彦威始由上路歸其後諸州殘破彦威提孤軍守孤城外絶救援而堅壁屹立大軍數攻饒風不下乃自箐口斡腹明年六月大隊從谷中奄至百道攻城彦威死之金州陷謀窺開達下瞿塘夔州路安撫盧普集兵命李安國節制諸軍分守雲安白帝等關十一月二十七日大兵忽自州後卧龍山突至白厓統制楊福興戰不利普及安國遁福興再戰八磧所部止三千殺傷相當收兵入關大兵四面蹙之前軍汪統制戰没西門餘兵止三百人福興猶戰不已援不至死之兵皆没忠義集巻二
