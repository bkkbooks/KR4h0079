body:
  text: 忠義集巻四元趙景良編昭忠逸詠丞相江公萬里知府江公萬頃名重天閽侍太微昔年南國秉樞機人歸綠野身猶健兵滿紅塵世已非止水亭前風淅淅鄱陽城外草依依棣華相映人間瑞節惠隆名世所稀大兵之下饒城也前丞相江萬里家城内聞變於其家止水亭前池内赴水死之闔門悉受屠戮弟萬頃前知南劒州亦遇害後贈萬里太傅與致仕遺表恩澤賜諡文忠宗室趙公崇源南風不競慘悲聲幙燕泥牛總是驚玉牒名香時已逝金枝花悴本難榮身明六籍忠仍孝軍滿孤城死亦生後度推敲明月夜江村村外寄幽情崇源號江村寄居信州有詩名兵至郡自縊而死一本但言自死無縊死二字端明招討使汪公立信如此竒才正可憐曾陳大計為安邊天存廟社施籌策地限藩籬老嵗年獨眼明明尋趙地丹心耿耿向淮堧江南寸土聨區脫慟哭髙沙赴九泉襄陽之受圍也立信帥湖南貽書賈平章陳三策一謂内地兵多無所用宜盡抽摘可五六十萬起赴江北或百里或二百里分置一屯各設都統江面七千里諸屯相望設大藩府二以督之急則上下流互相應援必無能破吾聮絡之勢者久而勢成雖進亦可二謂久縶北使郝經何益不如遣使送之北歸㗖以厚利緩其師期年嵗間我江外之藩垣成氣勢亦固江南之生兵日益禍少紓矣三謂若此二説不可行惟有准備投拜正欲激賈似道行前二䇿也似道見書怒罵曰瞎賊敢小妄語葢立信目𤯝故云襄失以立信鎮江陵未幾召為刑部尚書不拜大兵渡江起為端明殿學士沿江招討使立信知國事已去以其家囑愛將金明時兩淮猶為宋守立信渡江趍淮㑹似道出督師相遇江上撫立信之背泣曰端明端明不用公言以至於此立信曰平章平章瞎賊今日更道一語不得矣似道問何徃立信曰今江南無一寸乾淨地欲去尋一片趙家地上死要死得分明爾遂抵高郵寓高沙亭丞相伯顔入建康駐立信宅有告立信嘗獻三䇿者伯顔驚歎謂江南有人若用其言吾安得至此因厚待其家議遣使迎立信歸金明不敢泄所寓密价至髙郵以報立信拊掌哭曰吾猶幸得在趙家地上死也大慟而卒葢乙亥二月之廿有一日云丞相信國公文公天祥金字牌飛出建章鬱孤萬壘為勤王驅馳嶺海君臣寓囚繫燕雲道路長六籍一時光日月孤忠萬里立綱常元歸凛凛渾生氣南北人誇姓字香天祥字履善一字宋瑞吉州人寶祐丙辰進士第一時年二十一累仕至湖南提刑遷知贑州大兵渡江天祥首張榜檄暴揚諸吕罪狀糾合義勇期入衛君父卓為四方勤王之倡除江西安撫兼提刑乙亥春也天祥召募應者雲合夏四月有祖母喪解官治塟起復趍入衛提其兵以行戈甲精明號令嚴肅未出境遽留屯隆興天祥抗章言軍士踴躍願赴國難為勤王也奉詔留屯大沮士氣乞如前詔赴闕久乃許之八月至行在所駐兵西湖九月除浙西江東制置使兼江西安撫使知平江府陛辭乞斬賈似道釁鼔冬十月九日領兵赴鎮大兵已圍劉師勇於常州亟遣兵五千救之二十七日戰於五木敗績贑將尹玉死之師勇单騎突圍走常州下廣徳軍繼下安吉危獨松千秋二關俱震京畿危急趍天祥入衛十一月二十二日發平江既至拜疏自劾以所部州降陷也請誅斥詔不允令疾速赴督府議軍事進資政殿學士陞制置安撫大使令置司餘杭守獨松關明年丙子正月二日兼知臨安府辭不拜詣闕陳大計不得見所部聚富陽以俟十八日丞相巴延營于臯亭山十九日早以天祥為樞密使都督諸路軍馬㑹使轍交馳北師約當國大臣相見執政侍從聚左相吳堅府交賛天祥一行天祥見奉使無留者欲徃覘虚實歸而謀焉乃辭相不拜二十日以資政殿學士出使見丞相巴延元帥索多天祥曰講解一事前宰相首尾非予所知今太皇太后以予為相予不敢拜故來軍前商量巴延曰丞相来勾當大事言甚善天祥曰本朝承帝王正綂衣冠禮樂所在北朝欲以為與國乎抑欲毁其宗廟社稷乎二帥以詔㫖為解謂社稷必不動百姓必不殺天祥曰爾前後約吾使多失信今兩國丞相親定盟好宜退兵平江嘉興俟講解之説聞奏北兵待區處何如辯難甚至天祥曰能如予説兩國成好幸甚不然南北兵禍未已也巴延憤語侵天祥天祥曰吾為南朝状元宰相止欠一死報國刀鋸鼎鑊非所懼也乃覊縻天祥不使復還明日宰執吳堅賈餘慶謝堂家鉉翁劉岊等以國降天祥遂前責巴延失信留使又詬斥呂文煥引敵陷國并斥其侄師孟負國所募兵在富陽者潰而西歸二月八日堅等以祈請使赴北併驅天祥登舟二十日至鎮江用其客杜滸計得逸與從者十人以晦日登舟夜走淮東三月朔入眞州與守將苖再成恊謀興復天祥喜甚為移書兩淮帥将等初三日李庭芝遣使至出文書述脱囘人李七二供有丞相徃真州賺城謂天祥為北用使諭再成決無宰相得脱理縱脱亦無十二人得同来之理何不以矢石攻之乃開門放入邪意使再成殺天祥也再成憐之不忍害然亦不敢留出之西城門外天祥與滸徬徨無所歸從者皆無人色再成俄遣二校將數十卒㩦行李還天祥衛送出境且覘其去就決處置行野中露刅甚恟固叩其所向天祥曰揚州二校勸令徃淮西天祥曰淮西與建康太平池州江州對境北兵布滿無路可歸正欲見李制使或能信我尚欲連兵以圖興復二校曰揚州殺丞相奈何天祥曰信命二校知無他志乃辭天祥贈以金而别夜徑北戍衘校疾行三更抵揚州城下門守森嚴既前復却風露凄清鼓角悲惨四更滸曰李公必不見信徒為矢石所陷不如趍高郵從通州渡海歸江南或遇二王仲報國志徒死此無益也將曉聞北哨至乃變姓名易服詭行間關險阻閏三月至通州航海至浙東至台州夏四月至瑞安五月益王登極於福州召天祥二月六日至授通議大夫右丞相兼樞密使都督諸路軍馬與陳宜中並相首責宜中當奉三宫與二王同奔奈何弃其所重宜中慚嘿又數誚其怯懦紀綱不立權戚用事且曰檀公上策不意公能得之宜中不樂見大将張世傑問兵數多少世傑以所部對天祥嘆曰公軍在此矣朝廷大軍何在世傑亦不樂天祥乃議府規恢江西七月四日發行在所十三日至南劍募兵冬十一月入汀瞰贑十二月初命招討趙時賞以兵三千復贑之寜都縣千户趙溍以兵自建昌至時賞走寜都復陷千户關某鎮撫孔遵以二十九日率師至明年丁丑春正月大兵向汀天祥命江西提刑趙孟濚領兵收復屯寜都城外不戰而退天祥退屯漳州龍岩縣三月屯梅州夏五月復贑之雩都縣六月進據興國縣遣兵攻贑不利七月江西宣尉李恒統師至吉分将援贑走孟濚于贑城下恒以兵擣興國襲天祥窮追四百餘里八月十七日至空坑天祥敗執其夫人歐陽氏及一子二女及趙時賞孫㮚等天祥竄榛莽中追将囊嘉岱貪收金帛因得逸復收散卒冬十月入汀復出㑹昌入安逺趍循戊寅春二月屯恵州海豐縣三月屯麗江浦遣使訪問宋主夏六月宋主泊厓山天祥移軍船澳八月至加少保進爵信國公冬十月屯潮州潮陽十二月東省元帥張𢎞範舟師至移屯海豐是時止備水道不虞陸路也趙孟濚為前鋒鄒鳯殿北騎二百兼程追襲二十日午至五坡嶺望見山上步卒四集叩之左右咸謂鄉人捕鹿也奄至中軍天祥被擒官屬士卒昔得脱於空坑者至是俱遭執僇唯孟濚以先行十里得遁明年二月六日厓山師潰國亡送天祥如燕十月朔至燕械繫千户所十一月二日以疾脫械初九日召詣樞密院長揖不跪丞相慱囉命譯者問有何言天祥曰我為宋宰相國亡職當死今日被擒法當死復何言慱羅曰有人臣将宗廟社稷城郭土地付與别國後又逃者否天祥曰謂我曾為宰相奉國與人而復去之邪我前除宰相不拜奉使巴延軍前即被拘執别有賊臣獻國國亡我本當死所以不死者以度宗皇帝二子在浙東老母在廣故圖去耳慱囉曰徳祐幼主非爾君邪棄嗣君别立二王豈是忠臣天祥曰徳祐不幸失國當此時社稷為重君為輕吾别立君為宗社計何謂不忠從懷愍而北者非忠從元帝者為忠從徽欽而北者非忠從髙宗者為忠博囉曰晉元帝宋髙宗俱有來歴二王從何受命張平章曰二王逃走其立不止是簒也天祥曰景炎皇帝是度宗皇帝之長子徳祐皇帝之親兄何謂不正登位於徳祐已去何謂簒陳丞相奉二王出宫時具有太皇太后分付言語何謂無所受命博囉曰汝為丞相若将三王同走方是忠臣天祥曰此説可以責陳丞相不可責我我不曽當國也博囉曰汝立二王有何功勞天祥曰國家不幸喪亡立君以存宗廟宗廟存一日則臣子盡一日之責何功勞之有曰既知不可為何必為天祥曰人臣事君如子事父父不幸有疾雖明知不可為豈有不用藥之理盡吾心焉不可救則天命爾今日天祥至此有死而已何必多言堂上怒令吏引去復入獄獄中集杜句為詩備載所歴皆忠憤凄激意壬午春自獄中寓書所親曰吾終之時惟書一賛於衣帯間云吾位居将相不能救社稷正天下軍敗國亡至為囚虜其當死久矣頃被執以來欲引決而無間今天與之機謹南向再拜其賛曰孔曰成仁孟云取義惟其義盡所以仁至讀聖賢書所學何事而今而後庶㡬無愧宋丞相文天祥絶筆冬因狂人薛寶持妄書告變指天祥為内應十二月初八日世祖皇帝召天祥于殿中天祥長揖不拜左右强之拜跪不可或以金撾搥其膝膝傷天祥堅立不動主上降㫖曰汝在此久如能改心易慮以事亡宋者事我我當令汝中書省一任坐者對曰天祥受宋朝三帝厚恩號稱狀元宰相今事二姓實負此心非所願也主上云然則汝何所願對曰願與之死足矣主上猶不忍遽麾之退初九日宰相奏曰天祥既不歸附不若如其請賜之死可其奏是日宣使以金皷迎之詣市天祥聞之欣然曰吾事了矣左右去其中戴黄冠荷械出顔色揚揚不少變時燕市觀者如堵宣使遍諭曰文丞相南朝忠臣皇帝使為宰相不可故隨其願賜之一死非他人比也宣使謂天祥曰丞相今有甚言語囘奏尚可免死天祥曰死則死耳尚何言天祥問市人孰為南東西北趍而南向再拜就死燕人凢有聞者莫不嘆息流涕天祥死後大風忽起揚沙石晝晦咫尺不見人守衛者皆驚吉州士人張𢎞道字毅夫號千載心與天祥善隨至燕負其顱骨歸葬廬陵天祥少有大志明鋭忠壮當世鮮儷其自贑勤王也綉其戰袍曰拚命文天祥﨑嶇萬里歸翊行朝赤心益堅卒死臣節芳名壮㮣與宇宙同不朽云從文丞相諸公奉檄勤王出贑城願從魁相立勲名吹嘘炎運延千載莫笑寒儒缺五兵常郡戰餘森廟祀空坑敗後麗官刑英才僂指那能盡凛凛英魂死亦生杜滸張汴鞏信劉洙尹玉宗繆朝趙時賞孫桌陳龍復彭震龍蕭燾夫蕭明哲常州守将王公安節知府姚公訔常州在浙西路改揚域吳延陵季子之邑秦置延陵等縣漢毗陵縣晉為郡又改晉陵隋置常州秦以子楚改陽羨圖經議無錫寜天下平有錫兵天下争故名錫山守合名垂二十秋将軍今度更風流人誇同谷英風壮天使毗陵殺氣浮守義只知伸我膝成仁那肯䕶吾頭將門出將真男子一任糢糊血髑髏閉門髙卧本無悰起守鄉城更總戎名姓已符前代史邦家能衛古人風金山不長僧成䜟銕壁雖堅卒易攻城守兩囘希世事橘香不泯氣如虹乙亥春三月大兵攻破常州将軍王安節被擒不屈死之安節前守合州節使堅之子也夏四月督府總統軍馬張世傑復常州留劉師勇守之即家起姚訔知府事公橘州第三子也常自十月八日被圍至十一月十八日城破師勇遁大兵憤其堅守屠之初大兵苦攻常不下城上語之曰若要得常州除是金山長歇後語也遂挾金山長老至長老􅘨死妄言此城乃龜形擊其首破矣至是併兵攻南門遂克之訔死之諡忠毅唐朝睢陽亦有姚誾死節訔古誾字也故詩云名姓己符前代史湖南安撫知潭州李公芾潭州在荆湖南路芮荆域屬楚黔中地秦置長沙郡漢髙封吳長沙王都臨湘晉置襄州隋改潭州又改長沙郡唐改潭州宋復武安軍節度平楚樓頭矢石驚焚香稽首别宸京盡殱妻子期全節寜死封疆不忍生煙燄張空隳趙璧旌旗倒影下湘城善刀人在同觀化名與澄江一様清至元十三年丙子春正月三日潭州下宋湖南安撫知潭州李芾死之潭為荆湖重鎮殷實繁麗開慶兵難帥臣向士壁力戰堅守城迄全咸淳中襄圍急汪立信為帥預憂之為浚築排柵計湘人憚勞議其迂甲戊留夢炎以觀文殿學士来鎮大兵渡江明年乙亥春宋徴諸道兵入衛夏五月夢炎盡提戍兵且席卷府庫以行乃以芾知潭州主管湖南安撫司公事芾蜀人僑寓衡州嘗尹臨安有能名一日因置水桶防虞以油飾其外有請併油其内者芾笑曰今日如何由得内賈似道方顓制弄權事多不從中復聞芾譏已大怒嗾言者論擊遂被重劾列之贓籍坐廢十年其門生曾淵子登朝祈似道得洗叙長江失守乃起芾為湖南提刑是年正月拜命即家建臺閲數月陞帥将赴鎮遣其長子避地南中以奉祭祀芾乃與親友别曰州無兵財誠知難守然君命無避是行必不免惟一死與城俱亡耳衆疑芾久廢觖望謾為是言十月三日右丞阿爾哈雅領重兵圍城連營環鎖城内僅存州兵守禦芾慷慨自厲軍兵咸願死守大兵攻擊無虚日明年丙子春正月攻益急破其西北城芾嘗厚一劊級沈安一日呼使前曰吾力盡不能守矣将就死勿使吾身為敵得其為我掩瘞馬汝宜先殺吾家眷而後殺我安惶􅘨不敢當芾怒曰吾平日厚汝者何事直為今日耳安悟挾刀入一家俱死芾就死縱火府治焚其屍安亦自殺湖南轉運判官鍾蜚英收文簿封府庫與都統制劉孝忠及帯御械吳思聰以城降州民或自屠其家或自縱火城内烟燄四起大兵且入死者數萬人爭門出走死於城外者又不勝計外十縣則先被屠掠枕骸蔽野千里無煙廣西經畧安撫使李與調兵来救憚不敢進僅駐衡永間為靜江捍蔽湖南提刑提舉司亦就衡州置援潭局募兵又招茶陵桂陽劇盜萬數以救潭亦不敢進潭既下羣盜潰散反大畧而歸是夏有自潭來者言城内蕩為瓦礫惟運司及皮參政龍榮故宅僅存戍兵結茅以居其一隅則敗屋數區而已潭受圍至䧟凡三閲月知衡州尹公穀衡州在荆湖南路桂荆域楚地秦屬長沙漢屬陽郡吳置湘東郡晉立湘州宋為國齊為郡梁置衡州陳置東衡州以本州為西衡州隋置衡州煬帝改衡山郡唐復衡州宋朝因之燕寢凝香未赴衡却從湘帥走湘城衣冠望闕臣辭主詔誥陳庭弟徇兄刼火煉成忠孝種英風鼓動懦頑名滿城盡節榮今古三百年餘徳澤情尹穀字耕叟潭州人登科入仕乙亥嵗差知衡州迓吏及門潭已受兵帥守李芾屈賛兵明年正月芾死城破穀取平生所受誥敕置庭中具衣冠望闕再拜謂其弟岳秀曰弟宜急走不可使尹氏無後吾受國恩義當死岳秀曰兄死弟安往願得俱死於是全家四十餘口老幼環坐婢僕席地鎖其門縱火自焚死江東運判趙公淮妾某氏按江東路有九州四十三縣建康府在江東路宋揚域吳越地楚置金陵邑其後吳及西晉齊梁陳並都焉云云宋仁宗陞建康軍節度中興改建康府石頭城昔號金湯岌岌孤墉戰馬場西日突圍迯溧水南冠荷校說維揚血凝漢節誇男子身寄秦淮藉女郎千載妾身貞更潔仰天哭向水雲鄉淮潭州人席門䕃仕至江東轉運副使置司建康大兵臨城突圍趍溧水民寨寨破被執不屈械擊詣揚州城下令淮呼城中官吏出降淮反其詞北兵怒復執歸建康殺之淮之出奔也一妾與俱既及難為某萬户所得語萬户曰妾願事相公終身然趙運使既死無人埋骨願輿妾往殯殯畢即歸萬户惻然如其言迨至死所屍弃江濱妾命輿夫椎屍入水水猶淺不流妾乃取篙自推之入深水中即仰天大哭躍入水中而死都統制密公佑漢鄂塵飛路已迷殘兵早發向江西豈知主帥輸城邑謾使偏裨效鼓鼙就縛呼天懷象魏臨刑吐氣幻虹霓酸風慘淡精魂逺龍馬坪頭戰鬼啼佑淮人起行伍為将嘗戍荆岳㑹湖南北䧟諸州戍兵俱潰散佑與劉俊奔江西過撫州制帥黄萬石招𨽻帳下不知萬石久已為遁降計矣乙亥十一月隆興受兵守臣劉槃屢請援萬石遣佑将兵三千以往戒勿戰二十五日至進賢縣之壁畬猝遇大兵佑忠憤即戰戰正酣矢貫其腦猶自㧞矢以指按瘡呼軍士曰孩兒毎止好用力殺俄而昏憊被擒軍皆没元千帥宋都木違嘉其勇以良藥付瘡强之降不肯命以户金牌叱不受曰請死遂囚于隆興久之察其終無降意遂斬於西華門外臨刑其子市北飯以進佑叱曰此是狗喫底東西亟將去復市南飯以進飯訖臨刑嗟乎後之人能如密公之忠勇者鮮矣然亦大文夫當為之事耳沙市監鎮司馬公夢求荆水滔滔百尺渾邇來淺縮漫潺湲木城聫岸風輪吼沙磧屯雲火炬燔效死小臣懷緑綬偷生大閫愧朱轓下官名姓君知否涑水先生七世孫至元十一年乙亥夏四月五日大兵至沙市距江陵止十五里兩城相望中隔一水築堤通行市南阻川江北倚江陵地勢險固為舟車商旅之㑹恃水為防是年湖水忽涸市南沙磧皆露大兵陳磧上乗南風縱火肉薄登城遂下守将程又亮降監鎮司馬夢求戰死温國文正公七世孫也後五日川江大漲沙市城脚皆没己無及矣忠義集巻四
