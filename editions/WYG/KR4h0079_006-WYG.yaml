body:
  text: 忠義集巻六元趙景良編附録諸公詩一清父唐先生涇道州龍山人甲戌客臨安時賈似道當國金谷煙花醉未醒鼾邊無夢到功名十郎腹裏長函劍六丈胸中舊貯兵天豕星沈狼有影海鰌風𦂳鶴無聲如聞浩浩愁相訊何日衣冠樂太平和朱以性擬駕竒肱閱四方轉頭又是海生桑鴈雖有帛難尋漢猴縱無緋肯拜梁泱漭黄流翻地軸屈盤紫氣貫天章箧中留取秋蘭佩不識人間有水蒼江南西遷國之亡天也歌以紀之杭亡吳峯一髪暮雲孤愁向湘纍訊故都鳯去只餘韶樂在鴈來還有帛書無杏壇有客陳孤注平隴何人復五銖歌徹􅎟離風雨惡南山深處呌烏烏閩亡徙東廣逖泉已矣又菇蕕半壁乾坤只恁休頻嵗建杓移北斗何人持節救東甌烟蜚檣艫風濤怒雲鏁樓臺日月愁南望羊城天欲暮可堪囘首問神州廣亡徙海箕冠如櫛擁茅旌誰執騂旄㰱晉盟遵海而南關氣數渡江以北少功名火旗晻靄雲藏闕水陣周遭雪壓城一榻不容人鼾睡那知霧島是神京厓山亡萬里輿圖入朔方搖搖孤注海之陽石尤風惡雲蔵軫天駟星沈月掩房島上有人悲義士水濵無處問君王羲和指着烏飛路去去虞淵暮色蒼江南四忠節國之紀也歌以哀之咄咄薫風夢已靈手提孤注竞逃盟南冠入海五百客北斾歸燕七十城自信丹心終徇國只慙白面不知兵二爻無遯公知否底事吳門變姓名同時人物今猶昨只有先生死朔方殿下青衣晉天子窖間白髪漢中郎平生東海心猶壯千古西山骨亦香三復纍臣吟嘯集天荒地老氣蒼蒼誰把南牙壓武夫到頭還似二公無矢心海上逃秦爵努力山中匿趙孤赤羽星沈迷輦鳯紅旗風勁逐檣烏三神杳眇人何在留取丹心付董狐丙子紀事才結嵗寒盟歸來詫太平閣中呼尚父殿下狎門生着手營三窟囘頭失兩京聞今不聞古咄咄詭知兵懷黄小牧瓠俎桑弧莅舊盟天将吾道寄山林梧桐卧雨魚生釡梅塢吟雲鶴伴琴海上蘇卿今白髪山中杜甫老丹心擬呼尊酒論今古黄葉蕭蕭楚水深讀史懷友羞登廣武議英雄匣却吳鈎弢却弓幕下清談王太尉門前白馬褚司空一編衮斧風塵表千古綱常天壤中說與華隂捫虱老何曾正朔在江東虚谷方先生囘挽吕襄陽詞婉意切葢譏之非美之也將軍報國寸心丹滿眼兒孫盡好官一品已頒新印綬九重猶許舊衣冠碑存峴首懷羊祜箭着浮圖恨賀蘭公論百年應自定且留忠節後人看復見丁先生開湖南長沙人負氣敢言安撫向士壁被羅織開詣闕陳士壁功大軍府小費不宜推究似道怒覊管揚州嵗餘卒可惜此為向公也日者天何及天乎有不平功髙人共嫉事定我當烹父老俱嗚咽天王本聖明不愁罹黨禍揮淚向孤城秋宇彭先生襄樊失守六年援絶困重圍到此無謀更出竒慷慨如張雖有愧孤窮似李亦堪悲列城寒月驚鴻散夷路西風哨馬馳機速房深謀畫處豈無髙着活危棋江上師潰江上西風督戍秋國人延頸捷隨收中宵棄甲三軍潰徃嵗藏弓百戰休甚羨虞公前采石可憐丁謂後雷州諸賢着意籌新局嫠婦如今正有憂南征聖皇神武志䂓恢南國胡為貢未來銅柱地荒雲隔斷珠崖天盡鴈飛囘秋風曾見秦師出曉日今聞漢詔哀中國有人終慕化且看萬象樂春臺再平南擾乾坤重闢八荒春何事中間有末臣南粤一隅先漢地陽樊數世有周民山川慣識旌旗影道路長愁士馬塵聞説討平歸奏凱剰俘女子載珠珎西風邊笳悽惨動江城朔鴈南飛幾陣横雲氣昏昏秋萬里旄頭烱烱夜三更向來海上鳬毛出何日關中馬角生天地無情豪傑盡西風顛倒若為情庚申喜聞萬方歡喜醉春風數路飛書奏凱同天擬諸公扶社稷人言多難識英雄周邦雖小名猶正楚國方强力易窮從此東南基岱岳好磨崖石頌成功邊事邊頭無日不秋風荐食無厭更啓戎誰擁貔貅專玉帳不收鸚鵡着金籠江曾飛度量絲熟襄已重圍墮甑同安得扶持今社稷重來韓岳數英雄乙亥紀聞羽書朝暮漲氛埃天詔勤王起草萊塞上風髙鷹颺去江頭霧暗馬飛來諸賢忠愛謀安出四將英靈喚不囘漠漠雪天秋萬里飛鳴無數鴈鴻哀乙亥冬禍亂方來苦不禁此生誰料有如今四郊雲擾旌旗影諸閫風寒社稷心杞國有人憂凛凛桃源無路入深深少陵野老懷忠憤醉裏攅眉强自吟讀吟嘯集興廢明知數有天臣心感激義當然孔明尚欲西都蜀王蠋寜甘北面燕鳯鶴不靈凄落日蛟龍已逝冷長川丈夫一為綱常死表表人間萬古傳力支大厦烱孤忠太息黄旗運不東天若有情虹貫日人誰不死氣凌空倍增晁董儒科重可與夷齊史傳同地位九分人物好更於何處覔英雄秋興沙塵破褐客秋風落落親朋半老翁野曠有時聞嘯虎天寛無處寄征鴻四方玉帛燕山北萬里㠶檣海水東囘首可憐歌舞地芳花石礎樹隂中西風捲地送凄凉目斷歸㠶落日黄鴈過江天雲漠漠龍遊滄海水茫茫故人入夢三更月近事驚心兩鬂霜試把濁醪澆磊磈樽中猶帶芷蘭香世事茫茫世事等浮萍愁緒方濃醉又醒日月雙飛天不老干戈百戰地常腥此時弓馬多秦戍何日衣冠見漢庭宇宙西風愁不盡誰家門巷草青青聞鬼荒郊白骨卧枯莎有鬼銜寃苦奈何半夜數聲凄枕席十年幾度惨干戈英魂無託子孫絶史筆不知忠義多欲反髑髏生世樂近來富貴亦消磨感舊五更漏盡醉魂醒誰富胸中十萬兵如昔襄陽堅砥柱至今江左屹金城南來鐡馬吹唇沸北去銅人淚眼盈聞説錢塘風景異胥濤猶有不平鳴罪言四境風寒滿目秋區區嫠婦隠深憂豈無豪傑二三䇿亦有東南百十州斫案肯迎新造魏揮戈曾復舊宗周倉公一望休驚走好把囊中瞑眩投閑愁江横天塹湧鯨波信是閑愁兩鬂皤上界有春娛日月中原無夢冷山河扶持宇宙人非少經濟風濤論儘多昨夜甘泉烽火急禁中拊髀憶㢘頗感舊督府由來十六秋幾囘祈去幾囘留人稱姬旦三朝輔誰羨鴟夷一舸遊葛嶺春風天地醉蕪湖夜月古今愁平生心事青編在身與皇家共戚休以行鮑先生輗括蒼人性嗜酒授簡萬言晚益傲誕衲衣壁髻遊青城不返重到錢塘五詩興味悠長允為絶唱生死雙飛正可憐若為白髪上征船未應分手江南去更有春光七十年詩意疑慈元無賴山光疊疊青玉魚金椀早飃零冷思禹穴真竒事千古衣冠託杳㝠􅓖宫被發也萬家歌舞送浮生豈有涓埃畣太平猿鶴虫沙天始定不須辛苦怨南征疑為景炎聞道深春雪打圍誰憐身上藕絲衣莫憂白璧成塵土解逐南風萬里歸疑為徳祐惟有寒潮不世情朝朝暮暮過空城百年車馬閶門外獨獨春風草又生茂謙柯先生退子瑞陽人父名芝字士先魯港十年囘首付沾襟斷甲沈沙齒齒深可惜使船如使馬不聞聲皷但聲金人歌鬼哭那堪死木落江空正可吟遺老蕭蕭漸無語酒旗颭颭出蘆林自修程先生忘吾洛陽人孝友好讀書翰林元裕之上其言行除禮部郎中自修聞而遁痛哭此詠洛陵也公洛人必嘗親履陵闕故感傷如此宋以腐儒誤國猶西晉以清談誤國偉㢤雄論可為宋戒日射石虬鱗甲開草色又換青春囘精靈聚散豈拘束山鬼呌呼松栢哀當時沸天簫皷動今日悲風陵上來忽忽古今成傳舎人生有情淚盈把乾坤誤落腐儒手只遣空言當汗馬西晉風流絶可人悵望千秋共瀟洒如山安先生汝止成都廣漢人善擊劍左右射讀經史百氏之書端平甲午安撫曹友聞辟掌書記不起及友聞戰死三泉獨往收其骨蔵於其先之側乃東下老於㑹稽曹將軍友聞將軍精悍姿齒齒碎鐡石在昔童稚問但聞飽經術縱横騁柔翰丹護間金碧有司塞明詔弊邑屈詞伯芹香春水生冠玉侍重席脫落章句陋搜抉窮理窟未及文化成其如王土窄丈夫報主願豈必蒙清秩蒼然請去位滿面秋栗冽糾合熊虎羣旌斾揚廣陌正當磨礪間一皷㧞勍敵屯兵沔水源千載斧截截浩蕩排烟旻西極安嵲屼奈何國無人腐儒秉旄鉞賞予入私門金湯授盗賊公時奮臂爭返遭獻玉刖三軍視馬首痛哭天下璧功成坐齟齬憤怒須挿㦸中宵按劍起肅肅整羽翮吐氣風雲生搴旗陷堅列貫穿生死地喋血天地黒勢雖衆寡懸形未雌雄決路窮斷首尾衆盡仍手格豈知龍虎逝黯淡山川色百萬尚震驚嗚呼死諸葛長城但自壊千古痛稠結肉食無逺謀野史有直筆酒酣歌節士皛皛霜日白道立師先生嚴京西襄陽人讀書善槊射陷圍中拔身走行在所上書論事賈似道當國不執拂衣而去客死於武陵出襄陽渡江鹿門山人滄海客洒淚已枯眼見骨風塵崢嶸千里空不知何處營三窟城中性命湯火近路窮援斷無消息䑕竊狗偷何足憂都將十指漫天日大言濶步好公卿三百年餘涵養成己聞鄭五但搔首復道龎涓豎子名平時食肉誇果決誰知臨危跋㚄行白頭面皺牙齒落萬事已矣秋風生襄圍之愁苦似道之奸欺此詩盡之矣咸淳庚午朱尚書席上醉歌三月五日天風浩蕩何處來荆南府中好春酒我公此日盛賔佐但飲無勞問升斗座中十萬無下筯烏㡌朱衣牛馬走妙舞清歌如有神翠爛金明各囘首人生行樂須壯年小人再拜為主壽滿堂淚落起挽鬚臨饋三歎成鬰紆干戈未定邦國破亂臣賊子何代無主憂臣辱坐感激忍對花鳥調歡娛近聞士卒願一戰猛氣正倚風塵粗丈夫行事動千古快意一飽非雄圖仲材曾先生子良故家南豐徙居撫之金谿咸淳進士仕至淳安令國事變隠居陶塘號平山輓知臨安府兼浙西制置使曾公淵子徳祐思良弼江西出大臣報忠昭漢議靖獻有􅇻仁皦日五朝老清風百世人幾時歸衮綉秋草卧麒麟永紹傳賢啓慈元拱女堯鰲山猶贔屭鵬海極扶搖宫殿春旗曉簾帷社飯朝龍髯攀不及鸞馭去何遙立海終風黒洗光雙日紅餘波濺渤澥仙丈岌崆峒宗廟神靈在公師禮數崇平生精履屐尚覺小臣忠返輤榮歸寢帷堂哭設衣神情如夢叶滄海悵心違百世功言立千年城郭非任安猶未死哀淚不堪揮公字廣微自號留逺亦南豐派也析居金谿淳祐庚戌黄甲及第徳祐乙亥同知樞宻院事知臨安府兼浙西制置使國事急賈似道得罪陳丞相宜中當國公遁歸里被劾竄雷州臨安失守景炎祥興建朝于南中起公叅知政事已而北兵逼行朝公走安南而卒族姪平山公作詩四章遙輓之嵗久始有負其遺骸歸者哀哉無名氏賈秋壑故第樓臺突兀起城圍正是襄陽失援時王氣已隨檀板歇仁風空逐玉簫悲姓名不上忠臣傳家廟空遺御賜碑萬死莫酬亡國恨故園荒草正離離當年誰敢此經過相國門前衛士多諸葛功名今已矣周公事業竟如何雕梁畫棟蔵鼷䑕花礎芸堦長薜蘿誤國誤人還自誤空留遺跡在山阿介夫王先生題劉如村昭忠逸詠炎祚當年去不還欲成良史恨無官一朝人物歸吟興千古綱常紀筆端林下董狐堅直節山中杜甫老忠肝後來多少偷生者掩面西風不敢看忠義集卷六
