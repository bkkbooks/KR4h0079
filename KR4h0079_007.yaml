body:
  text: 忠義集卷七元趙景良編附錄諸公詩二文天祥詩越王臺登臨我向亂離來落落千年一越臺春事暗隨流水去潮聲空逐暮天囘烟横古道人行少月墮荒村鬼哭哀莫作楚囚愁絶看舊家歌舞此銜盃黄金市閉蓬絶粒始南州我過青山故首丘巡逺應無兒女熊夷齊肯作稻梁謀人間早見黄金市天上猶遲白玉樓先子神遊今二紀夢中揮淚濺松楸太和書生曾擁碧油幢恥與羣兒共竪降漢節幾囘登快閣楚囚今度過澄江丹心不變君臣義清涕難忘父母邦惟恐鄉人知我瘦下帷絶粒坐蓬忩金陵驛草舎離宫轉夕暉孤雲飄泊復何依山河風景原無異城郭人民半已非滿地蘆花和我老舊家燕子傍誰飛從今别却江南路化作啼鵑帶血歸又萬里金甌失壮圖衮衣顛倒落泥塗空流杜宇聲中血半脫驪龍頷下鬚老去秋風吹我惡夢囘寒月照人孤千年成敗俱塵土消得人間說丈夫楚狂汪先生感慈元殿翠華扶輦出龍庭密炬星繁天未明鵷鷺分行江上别貔貅從駕雨中行綠波淼淼浮三殿紫禁沈沈斷六更惟有周遭山似洛不堪囘首淚縱横水村劉先生壎西捷神器寜容小智窺黄河河上集王師六龍南面皇威壯萬里西征凱奏馳穹壤有靈扶寶祚風霜無地着金枝太平有象天顔喜大霈看看下玉墀附錢塘懷古題仙源雲仍家譜我宋南渡駐蹕臨安主闇臣奸偷安姑息始則檜賊陷忠良之將而讐恥莫伸失機恢復終則賈賊絶樊襄之援而藩屏既撤遂至危亡雖運祚之在天亦奸邪之誤國千載之後有遺恨焉此麥秀黍離之所以作也予雖不敏而傷感之情其理一也因編家譜遂成錢塘懷古律詩三章以寄興耳仙源嗣孫宜誠頓首重過西湖訪故宫還思往事恨無窮長城自壊封疆蹙重鎮輕捐堡障空目斷寒潮孤落日愁看秀麥幾生風時危英傑猶難濟況任奸囘托㓜冲似道専權擅國貶逐忠良信使覊留而不遣襄樊孤危而不援使之猶在神器必移況托以遺孤其能久乎此不明之過也皇元兵勢克樊襄南下臨安事可傷玉牒無光隨建業金閨遺址屬僧房年深堤栁還春色嵗晚宫梅尚暗香景物不殊人事改六橋風月幾炎凉繁華勝景悞前朝留戀湖山鋭氣銷七世衣冠還寂寞百年宫苑總荒寥屯營将士符天命故國君臣恨海潮天塹風濤猶莫恃寒更夢覺雨瀟瀟子長劉先生深前朝遺老盡銷磨感慨臨風發浩歌地闢天開新日月龍飛鳯舞舊山河西湖夜雨紅蓮少南苑秋風碧草多惟有浙江潮水好年年此日漲鯨波宜城羅先生南渡戎衣寄海壖中原王氣集幽燕寒潮落日三千里秀麥東風六十年夢裏玉魚無𦵏地刼餘金像出中天誰知客子登臨處已後當時尚惘然則榮趙先生由仁號虚白自是東遷染路塵魯論誰識舊君臣龍飛鳯舞山如舊國破家亡恨莫伸潮水不來風正冷梅花吹落韻偏新巍巍白塔胡僧醉一巻金經奉紫宸思敬聶先生琚北兵發㑹稽七陵取其寳貢上以遺骸建塔于陵側晝守東南鼎祚過翠華冉冉渡黄河宫基雨過饒蒼蘚御苑春囘長碧莎閭井至今崇綺麗湖山依舊事謳歌玉魚金椀無從問塔影山隂夕照多天目峰摧王氣終長江戰艦順流東翠華搖落三宫逺紫禁荒凉六皷空和靖湖邊虚夜月岳王墳上老秋風興亡自昔關天運莫遣哀吟兩鬂蓬讀趙君家譜感十六朝衣冠文物之盛為賦乾坤畢竟屬昌陵夾馬先驚紫氣騰汴水九龍臨大統吳山七葉紹中興慶雲瑞日君臣際甘露祥風海岱清三百年餘深徳澤生靈草木盡光榮雲龍黄先生鯉仙源家譜見雲孫盡把錢塘往事論宫殿故基今佛屋山河遺恨有寃魂春風畫舸閑湖曲落日寒潮怒海門不改孤山只梅樹年年踈影月黄昏中行王先生復廬陵人圅封仙譜慨前朝派接天潢世胄遥九廟已迷梁苑雪諸陵空倚浙江潮山中父老今何在海上王孫不可招掩巻共君悲喪亂天涯風雨客魂銷道光胡先生東臯舊家流派出天潢徃事秋來可斷腸宫樹春深迷汴水海潮風起暗錢塘星垂五彩天文煥道啟諸賢國運康猶有雲仍已為庶細書家譜淚浪浪伯清甘先生淵炎祚當年徳業隆細編家譜見遺風忠良籌畧隳奸佞顛蹶皇圖愍㓜冲梁苑緑莎深夜雨吳宫白塔倚晴空岳王墳畔西湖路千載登臨恨莫窮叔鈞李先生錢塘潮水急於雷千載興亡亦可哀神器固知關氣運朝廷何以任奸囘諸陵秋草空遺恨南海風㠶更不來宇宙茫茫今古意江山囘首又塵埃文博彭先生卓玉輦南遷駐海頭朔塵如雨暗神州孤臣絶援樊襄失四將空存社稷憂紅樹號蟬荒苑暮白茅没馬故宫秋行人欲寄英雄淚還有寒潮向北流桃川周先生友徳錢塘曾屬宋山河王氣衰來奈若何人死海洋沉玉璽棘生宫苑没銅駝諸賢不及文風少六皷無聞寂寞多惟有西湖只如舊畫船來往逐清波忠義集卷七
