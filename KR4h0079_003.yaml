body:
  text: 忠義集卷三元趙景良編昭忠逸詠都統何公進張公珍老將由來進退宜幾回料敵計何竒地分南北興亡兆天限關山戰伐疲兵已不支猶奮臂將仍盡鋭慨輿尸坤維烽燧休頻舉猶恐英魂待出師辛卯冬十月二十四日大兵攻大安都統何進開關以戰殺北兵七百餘厲兵再戰忽望山後狼煙數通大兵自龍門由馬家陵斡腹已越大安四十餘里進急分兵防遏至新灘兵寡不敵進及統制王浩王侃呼延棫皆死戊戌冬都統張珍隨制置使王履正行邊入綿州十月十七日走彭州之竹溪大兵進襲逼甚珍以二千人伏山谷中自將五百人陳於谷隂北騎五百衝其陳珍弓矢齊發騎引趨谷隂伏發錯愕珍呼曰我是張憨子可急投降不降更何處走麾兵薄之大兵遂衄珍雖捷而大兵追襲不已再戰于導江履正已度珍為後拒三日糧絶力倦急引兵趨橋橋已斷乃入茂州界險隘失援軍不成列又戰於牛溪威戎關珍死之部將孫棟收散卒屯汶川什存二三同慶知府李公沖偕死節諸公同慶府在利州西路秦為隴西郡漢立武都郡晉仇池郡西魏成州隋漢陽郡唐復成州宋中興升為同慶府諸公耿耿抱精忠炎運將灰日不東北戍躐陵羣盜衄西陲震蕩列城空香凝燕寢榮何在鼎沸魚遊計已窮玉石俱焚天亦泣千年誰為憶高風辛卯十一月二十三日陷同慶府知府李沖教授伊震死之二十五日攻殺金坪統制趙章戰死端平乙未八月十五日統制張慶戰死于河池嘉熙丁酉十月二十四日大兵至嘉定知府張謙牧全家死大兵至遂寧府轉司主管文字趙拱寅死四川總領財賦王翊被執死戊中冬十月十八日大兵至黎州通判何充不屈死卭徠部渠帥石戴以千兵與大兵戰沒己亥正月十五日哨馬至成都城外都統秦忠孝由廣安引所部至遂前鏖戰軍士死者萬人忠孝父子皆死之十一月二十二日大兵至施州知州鮮于渭被執死四川制帥陳公隆之成都十六州六十一縣成都府梁州域古蜀國秦置蜀郡漢曰益州晉改成都國宋齊並益州唐改成都府趙宋因之狼煙又起錦城邊帥閫謀踈亦可憐先軫元歸應有恨萇𢎞血化豈無寃百身莫贖誰三酹一死真成蓋萬愆遺事如今人不記綱常猶幸立西川辛丑冬元帥圖薩以兵攻成都制使陳隆之嬰城固守大兵苦攻不克欲退而都統田世顯開大安門大兵遂入執隆之先殺其家制司參議蒲東卯而下死者十數人執隆之至漢川俾招都統王夔而隆之止書城破被執四字示之且呼夔勉力堅守圖薩大怒手刺殺之事聞贈待制立廟推恩族屬以為嗣知隆州蒲東寅被執不屈死臨江軍守臣陳公元桂臨江軍在江西路􅍮揚域吳地漢豫章郡領新淦吳安成郡領新喻南唐筠州領清江縣宋以清江為臨江軍𨽻以吉之新淦袁之新喻二縣衡湘斡腹扺清江太守乘城誓不降哨馬逺嘶驚墜鏑雄兵遙吒殞飛鏦玉麟符已還宸陛金鳯洲堪隱帥幢寄語豫章徐孺子聞孫勳業歎無雙己未大兵至臨江軍制置使徐敏子寓閫金鳯洲擁妓王妙日酣飲以兵少辭不迎遏哨漸近士民恃敏子不遷避郡無城列木為柵哨騎將至知軍陳元桂坐城門飛矢墜前衆勸其少避不從俄而大兵至不屈死之事聞特轉五官贈寶章閣待制立廟賜諡正節賜錢十萬助葬官其二子制司近隔一水終不調兵士民趨浮橋將依金鳯洲敏子已斷橋自保迸擁入水死者十數萬人厥後敏子貶死封州按封州在廣東路古南越地總統黃公仲文保義亷公節誰刑白馬誓西園背却宸旒棄塞垣存孝得名嗟虎噬酈瓊失節效麕奔父天母地君知否婢膝奴顔子勿言罵不絶聲軍又散更無人肯為招魂辛酉六月都統知瀘州劉整以瀘降北人稱整曰賽存孝武翼郎荆湖北副總管總統援蜀諸軍黃仲文有衆三千戍瀘衆欲乘未定奪舟東走整訹之曰以俞興兵故投拜與公無傷也事定當厚禮遣公翌日整乃分散其兵誘使降仲文大罵不屈整殺之保義郎廉節奉制檄糴麥于瀘不降遇害事聞仲文贈武顯郎除致仕恩澤外更與一子恩澤節贈忠訓郎與一子進武校尉觀使許公彪祖元戎忽已化鯢鯨少長呼來就此烹科第昔曽誇冠世衣冠今忍負平生休教秉筆修降表乍可捐驅肯獻城一惠已彰幽壤慰巍巍廟貌煥髙甍彪祖簡州人狀元奕子也罷郡奉祠祿寓居瀘城人稱許觀使劉整使修降表誘之降彪祖朝服以拜天地祖先率一家由少而長自絞死贈中奉大夫直祕閣除致仕恩澤外再與一子恩澤諡介節立廟都統張公桂金公文德已獻金湯又返鋒師奔山市甲猶𠂻鼠曽守隘機潛伏猿欲投林計已窮祭纛有靈嗟二將死綏無愧慨孤忠度瀘露布誰人筆謾詫當時制帥功制置俞興都統張桂金文德等收復兵逼城整出兵江上大戰敗走逐北至城門僅得入氣息垂絶興弗知不能乘勝奪門乃以日暮收兵明日整乘城拒守乞紐憐濟師興復圍城城中勢甚窮促而大兵來援八月摘圍城兵命都統王達晨往迎敵逮午復摘東門外圍城卒往助易他卒補缺更替未定間整登城見而悟亟命勇士從暗門突東圍始惟百十卒繼乃大至衝興師大潰興得小舟奔南岸黃市還重慶達聞敗亦遁附馬尾渡江士卒擁溺者十八九流尸蔽江而下惟桂文德力戰不敵死之桂嘗守老鼠隘軍中號曰老鼠張桂誓取整一日整令呼曰吾今日放貓捕矣桂以氣吞整不戒果遇害事聞贈桂容州觀察使文德復州團練使援襄都統制張公順襄陽府在京西路天荆豫之域楚地秦兼下自漢以北為南陽自漢以南為南郡魏分南郡置襄陽郡魏失守江陵南守襄陽晉為荆州治所東晉於襄陽置雍州西魏及隋唐皆為襄州唐升為山南東道節度以襄州為襄陽府宋朝因之真宗潛藩升襄陽府寶慶間以京湖制置安撫兼領今統郡七領縣四治襄陽滔滔一水會襄流派接均房密運籌虛舫設機要吊屈危檣抵壁暫安劉千兵效死旌麾合一將捐生介胄浮獨遡長橋猶不瞑為持忠節報凝旒大兵圍襄陽五年宋闖知其西北一水曰清泥河原於均房於彼造輕舟百艘以三舟聫為一舫中一舟裝載左右舟則虛其底而掩覆之出重賞募死士得三千求將得民兵部將官張順張貴智勇素為諸將所服俾為都統出令曰此行有死而已汝輩或非本心宜亟去毋敗吾事人人感奮壬申夏五月漢水方生發舟百艘每艘載卒三十鹽一袋布二百匹及他物以二十二日稍進團山下越二日又進高頭港口結方陳各船置火鎗火炮熾炭巨斧徑弩夜漏下三刻起矴以紅燈籠為號貴先登順殿之乘風破浪徑犯重圍至磨洪灘以上北舟布滿江面無罅可入衆乘鋭凡斷鐵絙櫕杙數百大兵迎敵近南船躍入竟墮水中溺死萬計轉戰百里二十五日黎明抵襄城下城中久絶援聞救至踴躍增氣及收軍獨失主將張順越數日有浮尸泝流而上被介胄執弓矢直抵浮梁視之順也身中四鎗六箭怒氣勃勃如生諸軍大驚以為神結冢斂葬立廟祀之援襄都統制張公貴忠勇堂堂貫斗牛英雄端不愧兜鍪鹿門雲合張羅網龍尾波翻化髑髏雙廟有靈開正祀孤城無援屹中流由來死節男兒事却笑明年有客羞貴既入襄襄帥吕文煥力留共守貴恃其驍勇欲還郢乃募二士能伏水中數日不食使持蠟書赴郢求援大兵圍守益密鹿門山水路連鎖數十里列撤星椿雖魚蝦不得度二士遇樁及柵即鋸斷之竟達郢還執許發兵五千駐龍尾洲以助夾擊刻日既定以七月七日别文煥東下登舟點視所部軍失去帳前親隨一人乃宿有過被撻者貴驚曰吾事泄矣亟行彼或未及知復不能銜枚隱迹乃舉炮鼓噪發舟乘夜順流斷絙破圍冒進衆皆辟易既度險地夜半天黑至小新城大兵數萬邀擊以死拒戰沿岸束荻列炬火光燭天如白晝至勾林灘漸近龍尾洲遙望軍船旗幟紛披貴軍喜躍舉流星火示之軍船見火即前迎及勢近欲合則來舟皆北師也蓋郢兵前二日以風水驚疑退屯三十里而大兵得逃卒之報遂據龍尾洲以逸待勞貴既不為備戰已困出於不意殺傷殆盡身被數十鎗力不支為大兵所執不屈死之乃命所降卒四人舁尸至襄令於城下曰識矮張乎此是也守陴者皆哭城中喪氣文煥盡斬四卒以貴附葬順處立雙廟祀之以比於張巡許逺守襄都統制牛公富范公天順將軍志喜竪降幡偏將能知大義存頭觸危樓輕烈熖脰經孤館凛忠魂聲沈刁斗摧城影塵掩干將滲血䀶世逺事殊遺老盡更無人解説襄樊至元十年癸酉三月十八日宋襄陽帥臣吕文煥以城降右武功大夫馬軍統制牛富守樊有功樊破守襄城降之際傷重不能步乃就戰樓以首觸柱數四投身火中死後贈靜江承宣使賜諡忠烈妻胡氏封郡夫人三子各子恩澤居鄂武功大夫都統制范天順與張貴同入襄及城降仰天大呼曰好漢肯降便死也做箇忠義鬼乃就所守地分自縊死從贈定江軍承宣使賜諡忠愍妻徐氏封宜春郡夫人二子各豫恩澤仍賜白金五百兩官田五百畝居黃沙洋堡裨將邊公居誼等兵威破竹列城驚誰信偏裨不肯迎兩箭離弦聲霹靂二雄交斃氣峥嶸可憐侯服微臣在忍見人間大厦傾萬木凋零風雪裏尚餘鐵樹一花明甲戌十一月二十二日沙洋新城守將黃順踰城出降二十七日屠其城提舉官邊居誼死之時居誼呼其儔張弓箭同發應弦而斃後傳為神池州通判趙公卯發昌州人昌州在潼川府路池州在江東路揚域古鄣郡梁屬南陵郡隋置秋浦縣唐池州宋因之分守池陽歷幾時坐輪戰馬四郊馳半空矢石應難禦一矗樓臺未易支血染帛書身永訣壁題詩句世長辭細君含笑從君後忠節雙雙今古竒至元十二年乙亥春二月大兵至池州通判權州趙卯發嬰城守禦度不能支有弟在他州卯發裂衣書一詩寄之曰城池不高深無財又無兵惟有死執國來生作弟兄又題於壁曰國不可負城難以降夫婦俱死節義成雙遂與其妻雍氏俱縊初六日武將張琳以城降丞相伯顔命琳於公帑支錢買棺斂葬作佛事以表之琳尋見殺饒州守臣唐公震饒州在江東路屬揚域楚地秦為鄱陽縣九江漢置鄱陽屬廬陵隋改饒州南唐永平軍宋復饒州遊騎如飛漸列營誰呼妓女出郊迎奔踰後圃逃生拙執辱中庭就死明瓦甕掩形慵屈膝金章繫肘吝輸城太常定諡應無忝贏得中流砥柱名大兵至饒州通判縱妓女迎焉將佐聚飲野寺止妓宿詰旦妓歸言曰昨所迎非真韃靼其言語舉止皆南人也豈姦黠詐飾為盜邪郡守唐震謀𠞰之兵遂出大兵亦衝入城城內亂震避于州治之後圃為大兵所執命之降不屈遇害有以醬缶覆其尸於州治之廡下者大兵據城後戒毋虜掠唯敷派撤花銀輸官江東提刑黃大任言敵勢鴟張如鄂如江如南康則賣降如寧國府守臣趙與則棄城逺遁獨饒州守臣唐震誓死不去昨得判官塢崇節報知為北兵所害已下本州如法棺斂安葬乞行褒贈通判萬道同輕徇迎降乞行追勒於是贈震華文閣待制賜諡立廟二子與京官恩澤道同追三官勒停有司具衣冠斂震於其肘得州印云忠義集卷三
