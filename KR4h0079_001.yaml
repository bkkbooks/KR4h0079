body:
  text: 忠義集卷一元趙景良編補史十忠詩序詩以厚倫美化為本如曰諧俗寄情而已即千篇奚益每思張許二顔同時死國名芳唐史與天長存近代死節數公何愧往昔顧麥秀黍離無繇倣栁州狀逸事上太史庶幾不朽竊以慨念更後幾年遺老漸盡舊聞銷歇將無復知有斯人者悲夫哀哉死臣子職分古人常事爾死矣寧顧其傳不傳乃亦不可無傳者為其係彛倫關風教厲後代之臣子愧前日之不如數公者也採清議得忠義臣十人史不書各賦十韻纂其實曰補史詩補史十忠詩知潭州湖南安撫使李公芾三已甘退休十連起遲暮伊誰急求子流落乃不怒黑雲來如山殺氣震平楚恭惟君父命封疆以身護闔門義不辱呼卒汝善處飛魂隨劍光自已投火去天泣鬼神愁地搖山嶽仆吾非莒柱厲敢以死醜主正自常事耳命義逃安所沖逺誰與儔睢陽有張許吉悒字祖沖丁穆字彥逺皆晉忠臣池州通判權州事趙公卯發昌州人妻雍氏若人作何狀立節乃殊偉人言此蜀珍位卑名未起坐分秋浦月攝此千里寄沙頭風色惡寒城凛𢎞峙吾聞開關迎棄遁亦復恥兹惟城郭臣大義吾知已間道走帛書灑血别玉季細君絶可人雙飛同一死南八彼男兒此婦乃如此骨朽香不廢吾詩當青史丞相都督信國公文公天祥丙辰狀元時平輒棄置事迫甘前驅嗚呼忠義臣匪直科目儒江寒朔吹急列城同一趨豈不寄便安綱常乃當扶移檄倡諸鎮奮袂躬援枹川決莫我回萬險棲海隅天乎復不濟道窮竟成俘一死事乃了吾頭任糢糊悠悠譏好名責人無已夫三衢有魁相投老作尚書三衢魁相謂留夢炎參政行丞相事陸公秀夫天地無託足海天同隰光明知復何為不忍隳三綱祼薦覬少延謳歌寧逺忘或者莒在齊聊且帝一方竭蹶竟委頓臣謀非不臧運去天莫留力盡心彌強終不負吾主名義天地長懷璽隨龍遊舉室水中央斯人文華士乃爾百鍊鋼機雲儻通譜應羞朝洛陽前左丞相江文忠公萬里弟萬頃匡廬雲錦屏鴻儒産其下風神儼如龍夭矯莫可駕卷懷經濟具婆娑洛中社怪事玉牀搖清晝天忽夜突騎從何來隂風飄屋瓦大臣義有死欲避吾不暇庭前環止水萬事付一捨從容友靈均朝野動悲吒愍章極哀榮汗簡誰記者倘有南熏書季方足堪亞江西制置司都統密公佑臣有置身義豈計官崇卑偏將知死忠不曰天下竒漢節既披靡失位趨江西閫帳駐臨汝招徠樂其歸雪寒南浦愁羽檄蘄濟師一將奮風虎鼓行亟颷馳踰嶺疾戰苦褁瘡呼健兒坐縛膝不屈伏鑕甘如飴小臣裨校耳職也宜死綏廬州大將在白首竪降旗淮東制置使知揚州李公庭芝淮海接風塵胡乃似鐵壁卧護有天人十載藉福力重來人未老愁絶事如昔苦戰孤城危痛哭天柱折夢遊三山上人倫浮海出突圍志南征吾欲重建極天弗鑒臣忠冥冥墮􅓜棘先軫面如生萇𢎞血化碧臣死誰復知臣忠終不易一將更大事嚼舌死罵敵樞密閩廣宣撫使陳公文龍戊辰狀元淳熙名宰孫比德粹如玉決科魁偉英駸駸豸冠肅類田煩諫疏相嗔俄嗾逐補郡仍免歸黃流已漫陸天族日光薄力疾支顛覆蹉跎南冠縶道病死不辱往昔五峰堂傾蓋語跋燭斯人真妙人哀哉慳厚祿長揖丙辰魁各天並黃鵠不有二忠存千古笑科目少傅樞密使張公世傑士有守節死豈以責武夫武夫尚能竒消得銀管書何許熊虎英鐵面美髯鬚護寒久枕戈赴難甘捐軀金山定活著志願嗟違初江心集羣策炎精回一噓間關障海嶺萬死存趙孤時也可奈何北風散檣烏漂漂竟何之無乃膏鯨魚渭濵多貴將反笑斯人迂四川制置使知重慶府張公珏坤維拓提封形勝古天府血戰五十秋零落餘八柱江南傳箭急誰暇此回顧落日古渝城杖鉞乃甚武天東甑雖墮吾自強支拄渡瀘躬討逆歸來戰彌苦蕭條下夔門機穽伏中路咄咄快敵仇誰歟掩壞土哀哉關西雄國亡猶不負同時督軍將腰金插雙虎右襄圍以來死忠者不止此然多所不知知其詳且顯者莫如此十公故先賦此十詩尚俟續書以著大節噫十詩存即十忠不亡十忠不亡吾十詩亦永存矣是未易與俗子言之兒輩深藏之非深於詩精於理者勿輕示之云忠義集卷一
